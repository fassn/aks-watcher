services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aks
      POSTGRES_PASSWORD: aks
      POSTGRES_DB: aks_watcher
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-shadow-db.sql:/docker-entrypoint-initdb.d/init-shadow-db.sql:ro

volumes:
  pgdata:
